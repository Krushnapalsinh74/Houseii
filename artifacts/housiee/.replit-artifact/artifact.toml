kind = "web"
previewPath = "/"
title = "HOUSIEE.IN"
version = "1.0.0"
id = "artifacts/housiee"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23333

[services.development]
run = "pnpm --filter @workspace/housiee run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/housiee", "run", "build" ]
publicDir = "artifacts/housiee/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23333"
BASE_PATH = "/"
